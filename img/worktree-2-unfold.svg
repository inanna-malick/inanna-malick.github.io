<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace">
  <defs>
    <marker id="s2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4ec9b0" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect width="820" height="400" rx="8" fill="#1a1b2e"/>
  <text x="24" y="32" fill="#888a9e" font-size="13" font-weight="600">2. Unfold — TL decomposes, spawns subtask branches</text>

  <!-- main (dimmed) -->
  <rect x="20" y="160" width="100" height="42" rx="6" fill="#222440" stroke="#3a3d5a" stroke-width="1" opacity="0.4"/>
  <text x="70" y="185" fill="#e8b931" font-size="11" font-weight="600" text-anchor="middle" opacity="0.4">main</text>
  <line x1="120" y1="181" x2="154" y2="181" stroke="#4ec9b0" stroke-width="1.5" opacity="0.25"/>

  <!-- core-eval -->
  <rect x="160" y="152" width="170" height="58" rx="6" fill="#1e3a5f" stroke="#2e7db3" stroke-width="1.5"/>
  <text x="245" y="176" fill="#5cb8e4" font-size="13" font-weight="700" text-anchor="middle">core-eval</text>
  <text x="245" y="194" fill="#888a9e" font-size="10" text-anchor="middle">Claude TL</text>

  <!-- Spawn: core-eval → heap (top path) -->
  <path d="M330,168 L370,168 L370,78 L408,78" fill="none" stroke="#4ec9b0" stroke-width="2" marker-end="url(#s2)"/>
  <!-- Spawn: core-eval → codegen (straight) -->
  <line x1="330" y1="181" x2="408" y2="181" stroke="#4ec9b0" stroke-width="2" marker-end="url(#s2)"/>
  <!-- Spawn: core-eval → optimize (bottom path) -->
  <path d="M330,194 L370,194 L370,286 L408,286" fill="none" stroke="#4ec9b0" stroke-width="2" marker-end="url(#s2)"/>

  <!-- core-eval.heap (Claude TL) -->
  <rect x="416" y="52" width="170" height="52" rx="6" fill="#1e3a5f" stroke="#2e7db3" stroke-width="1.5"/>
  <text x="501" y="75" fill="#5cb8e4" font-size="12" font-weight="700" text-anchor="middle">core-eval.heap</text>
  <text x="501" y="91" fill="#888a9e" font-size="10" text-anchor="middle">Claude TL</text>

  <!-- core-eval.codegen (Gemini) -->
  <rect x="416" y="157" width="170" height="48" rx="6" fill="#3a1e5f" stroke="#8b5fbf" stroke-width="1.5"/>
  <text x="501" y="178" fill="#c49bea" font-size="12" font-weight="700" text-anchor="middle">core-eval.codegen</text>
  <text x="501" y="194" fill="#888a9e" font-size="10" text-anchor="middle">Gemini Dev</text>

  <!-- core-eval.optimize (Gemini) -->
  <rect x="416" y="262" width="170" height="48" rx="6" fill="#3a1e5f" stroke="#8b5fbf" stroke-width="1.5"/>
  <text x="501" y="283" fill="#c49bea" font-size="12" font-weight="700" text-anchor="middle">core-eval.optimize</text>
  <text x="501" y="299" fill="#888a9e" font-size="10" text-anchor="middle">Gemini Dev</text>

  <!-- Spawn: heap → gc-trace -->
  <path d="M586,68 L620,68 L620,46 L648,46" fill="none" stroke="#4ec9b0" stroke-width="2" marker-end="url(#s2)"/>
  <!-- Spawn: heap → arena -->
  <path d="M586,88 L620,88 L620,112 L648,112" fill="none" stroke="#4ec9b0" stroke-width="2" marker-end="url(#s2)"/>

  <!-- ...heap.gc-trace -->
  <rect x="656" y="22" width="140" height="48" rx="6" fill="#3a1e5f" stroke="#8b5fbf" stroke-width="1.5"/>
  <text x="726" y="43" fill="#c49bea" font-size="11" font-weight="700" text-anchor="middle">...heap.gc-trace</text>
  <text x="726" y="58" fill="#888a9e" font-size="10" text-anchor="middle">Gemini Dev</text>

  <!-- ...heap.arena -->
  <rect x="656" y="88" width="140" height="48" rx="6" fill="#3a1e5f" stroke="#8b5fbf" stroke-width="1.5"/>
  <text x="726" y="109" fill="#c49bea" font-size="11" font-weight="700" text-anchor="middle">...heap.arena</text>
  <text x="726" y="124" fill="#888a9e" font-size="10" text-anchor="middle">Gemini Dev</text>

  <!-- Legend -->
  <rect x="24" y="340" width="772" height="44" rx="4" fill="#15162a"/>
  <rect x="44" y="354" width="20" height="12" rx="3" fill="#1e3a5f" stroke="#2e7db3" stroke-width="1"/>
  <text x="72" y="364" fill="#5cb8e4" font-size="10">Claude TL</text>
  <rect x="160" y="354" width="20" height="12" rx="3" fill="#3a1e5f" stroke="#8b5fbf" stroke-width="1"/>
  <text x="188" y="364" fill="#c49bea" font-size="10">Gemini Dev</text>
  <line x1="300" y1="360" x2="335" y2="360" stroke="#4ec9b0" stroke-width="2"/>
  <text x="343" y="364" fill="#888a9e" font-size="10">spawn branch</text>
  <line x1="480" y1="360" x2="515" y2="360" stroke="#e06c9f" stroke-width="2"/>
  <text x="523" y="364" fill="#888a9e" font-size="10">file PR</text>
</svg>
